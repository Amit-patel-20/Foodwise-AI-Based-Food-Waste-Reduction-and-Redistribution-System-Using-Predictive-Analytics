{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <h2>Register</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <p>
            <label for="location">Restaurant Location</label>
            <input type="text" id="location" name="location" placeholder="e.g. Gomti Nagar, Lucknow" required>
        </p>
        <button type="submit">Register</button>
    </form>

</body>
</html>
